app-id: com.silverlab.SilverLab
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: SilverLab
finish-args:
  # Display: prefer Wayland, fallback to X11
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri

  # Access to user files (open/save images)
  - --filesystem=host

  # System fonts and fontconfig
  - --filesystem=xdg-config/fontconfig:ro
  - --filesystem=/usr/share/fonts:ro
  - --filesystem=~/.local/share/fonts:ro

  # GTK/Qt theme integration via xdg-desktop-portal
  - --system-talk-name=org.freedesktop.portal.Desktop

  # Environment for Qt theming
  - --env=QT_QPA_PLATFORMTHEME=kde
  - --env=QT_AUTO_SCREEN_SCALE_FACTOR=1

modules:
  - name: silverlab
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin/SilverLab_app
      - cp -r dist/SilverLab/* /app/bin/SilverLab_app/

      # Wrapper script with environment setup
      - |
        cat > /app/bin/SilverLab << 'EOF'
        #!/bin/sh
        # Ensure fontconfig picks up system and user fonts
        export FONTCONFIG_PATH=/etc/fonts
        export FONTCONFIG_FILE=/etc/fonts/fonts.conf
        exec /app/bin/SilverLab_app/SilverLab "$@"
        EOF
      - chmod +x /app/bin/SilverLab

      # Desktop integration
      - install -Dm644 packaging/linux/com.silverlab.SilverLab.desktop /app/share/applications/com.silverlab.SilverLab.desktop
      - install -Dm644 src/assets/icon512.png /app/share/icons/hicolor/512x512/apps/com.silverlab.SilverLab.png

    sources:
      - type: dir
        path: ../../
